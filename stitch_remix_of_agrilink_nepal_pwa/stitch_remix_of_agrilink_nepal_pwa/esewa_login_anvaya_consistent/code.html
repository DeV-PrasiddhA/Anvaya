<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .ambient-glow {
            box-shadow: 0 20px 50px rgba(0, 109, 62, 0.1);
        }
        input:focus {
            box-shadow: 0 0 0 4px rgba(0, 109, 62, 0.15);
        }
        /* Mobile height adjustments */
        @media (max-width: 768px) {
            .mobile-canvas {
                min-height: 100dvh;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-lg selection:bg-secondary/20 overflow-x-hidden">
<!-- Global Background Animation -->
<div class="fixed inset-0 z-0 bg-surface">
</div>
<!-- Main Auth Canvas (Focus Journey: Navigation Suppressed) -->
<main class="relative z-10 flex flex-col justify-center items-center min-h-screen px-margin-mobile md:px-margin-desktop py-lg">
<!-- Back Action (Temporal Departure Check) -->
<div class="fixed top-base left-margin-mobile z-20">
<button class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-surface-container transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-active:scale-90 transition-transform">arrow_back</span>
</button>
</div>
<div class="w-full max-w-md space-y-md">
<!-- Branding Header -->
<div class="flex flex-col items-center text-center space-y-sm mb-lg">
<div class="w-20 h-20 rounded-2xl bg-white shadow-xl flex items-center justify-center p-xs overflow-hidden">
<img class="w-full h-full object-contain" data-alt="A premium high-fidelity vector-style logo of eSewa, featuring the iconic white and green circular typography on a clean white background. The lighting is bright and professional, following a minimalist and clean tech-inspired aesthetic that reflects stability and financial trust." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6rfl62nQRhXi28OyxOeJcCSf_ktYvyNgODPcOR7RJ0liui6IDl14uMPKI7BV8pV-rGRhPmCF3PCyrst34Gf5wpoSI2TkBhXzUj3PucD4Hl8dg8f4TwR8_x2lPeMftGhCzSpKv3IOeiRhPyua_bDsDmGtUVfjCjgtW4Q9aXPEdyCZUcrr_jHhYJq3VZfrHMfxXRQowxfug1C9RIcVieNkrNy4j7QaFJr6EqoudcKlXQISwW8yyAMYC"/>
</div>
<div class="space-y-xs">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Login to eSewa</h1>
<p class="font-body-lg text-on-surface-variant max-w-[280px] mx-auto">Access your Anvaya integrated wallet securely.</p>
</div>
</div>
<!-- Login Card -->
<div class="glass-panel border border-outline-variant/30 rounded-[2rem] p-md space-y-md ambient-glow">
<!-- Fields -->
<div class="space-y-sm">
<div class="space-y-xs">
<label class="font-body-sm text-on-surface-variant ml-xs font-semibold">eSewa ID (Mobile Number)</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">phone_iphone</span>
<input class="w-full pl-12 pr-4 py-4 bg-white border border-outline-variant rounded-xl focus:border-secondary focus:ring-0 outline-none transition-all font-body-lg placeholder:text-outline/50" placeholder="98XXXXXXXX" type="tel"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-body-sm text-on-surface-variant ml-xs font-semibold">MPIN / Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-white border border-outline-variant rounded-xl focus:border-secondary focus:ring-0 outline-none transition-all font-body-lg placeholder:text-outline/50" placeholder="Enter your security pin" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-secondary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<div class="space-y-sm">
<button class="w-full py-4 bg-secondary text-on-secondary font-headline-lg-mobile text-body-lg rounded-xl shadow-lg shadow-secondary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-base">
                        Login
                    </button>
<div class="flex justify-between items-center px-xs">
<button class="font-body-sm font-semibold text-secondary hover:underline">Forgot MPIN?</button>
<button class="font-body-sm font-semibold text-secondary hover:underline">Register New</button>
</div>
</div>
</div>
<!-- Trust Badge Section -->
<div class="flex flex-col items-center gap-md pt-base">
<!-- Secure Payment Badge -->
<div class="flex items-center gap-xs px-sm py-xs bg-surface-container border border-white/50 rounded-full shadow-sm">
<span class="material-symbols-outlined text-[18px] text-secondary" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-caps text-on-surface-variant uppercase tracking-wider">Secure Payment Gateway</span>
</div>
<!-- Footer Text -->
<div class="text-center opacity-80">
<p class="font-label-caps text-on-surface-variant">Powered by <span class="font-bold">Anvaya</span></p>
<p class="font-label-caps text-on-surface-variant mt-xs">All transactions are encrypted with 256-bit SSL</p>
</div>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.parentElement.querySelector('.material-symbols-outlined');
                if (icon) icon.style.fontVariationSettings = "'FILL' 1";
            });
            input.addEventListener('blur', () => {
                const icon = input.parentElement.querySelector('.material-symbols-outlined');
                if (icon) icon.style.fontVariationSettings = "'FILL' 0";
            });
        });
    </script>
</body></html>
