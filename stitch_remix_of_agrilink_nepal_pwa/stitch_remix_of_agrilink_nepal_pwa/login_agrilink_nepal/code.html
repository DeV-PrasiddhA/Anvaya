<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(113, 121, 115, 0.2);
            transition: all 0.2s ease;
        }
        
        .glass-input:focus {
            border-color: #002d1c;
            box-shadow: 0 0 0 2px rgba(0, 45, 28, 0.1);
            outline: none;
        }
      </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-sm text-on-surface relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Login Card -->
<main class="w-full max-w-md">
<div class="glass-card rounded-[24px] p-xl shadow-[0_8px_32px_0_rgba(0,0,0,0.08)] relative z-10">
<!-- Header -->
<div class="text-center mb-xl">
<div class="w-16 h-16 mx-auto mb-sm bg-primary-container rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-xs">Welcome Back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to your Anvaya account</p>
</div>
<!-- Form -->
<form class="space-y-gutter">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs ml-1" for="email">Email Address</label>
<input class="glass-input w-full rounded-xl px-md py-sm font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant" id="email" placeholder="farmer@agrilink.com" required="" type="email">
</div>
<div>
<div class="flex justify-between items-center mb-xs ml-1">
<label class="block font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="glass-input w-full rounded-xl px-md py-sm font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<div class="flex items-center mt-sm mb-lg ml-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 bg-transparent cursor-pointer" id="remember" type="checkbox">
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-body-lg text-body-lg font-600 py-md rounded-xl transition-all duration-200 active:scale-[0.98] shadow-sm" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-lg">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="px-sm font-label-caps text-label-caps text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-sm mb-lg">
<button class="flex items-center justify-center gap-sm py-sm px-md rounded-xl border border-outline-variant/30 bg-surface/50 hover:bg-surface-container-high/50 transition-colors">
<svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-sm text-body-sm font-600">Google</span>
</button>
<button class="flex items-center justify-center gap-sm py-sm px-md rounded-xl border border-outline-variant/30 bg-surface/50 hover:bg-surface-container-high/50 transition-colors">
<svg class="w-5 h-5 text-on-surface" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.04 2.26-.74 3.58-.78 2-.04 3.44.86 4.3 2.1-3.64 2.12-3.08 6.94.39 8.35-.74 1.76-1.57 3.5-3.35 2.5zm-3.32-14.3c-.15-2.05 1.65-3.8 3.56-3.98.28 2.2-1.89 4.15-3.56 3.98z"></path>
</svg>
<span class="font-body-sm text-body-sm font-600">Apple</span>
</button>
</div>
<!-- Sign Up Link -->
<p class="text-center font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-secondary font-600 hover:text-primary transition-colors ml-1" href="#">Sign Up</a>
</p>
</div>
</main>


</body></html>
